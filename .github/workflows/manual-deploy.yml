name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - canary
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

      - name: Prepare deployment bundle
        shell: bash
        env:
          DEPLOY_CATWLK_DB_NETWORK: ${{ secrets.DEPLOY_CATWLK_DB_NETWORK }}
          DEPLOY_VIF_DB_NETWORK: ${{ secrets.DEPLOY_VIF_DB_NETWORK }}
          DEPLOY_MAKEPAD_DB_NETWORK: ${{ secrets.DEPLOY_MAKEPAD_DB_NETWORK }}
          DEPLOY_VESTIAIRE_DB_NETWORK: ${{ secrets.DEPLOY_VESTIAIRE_DB_NETWORK }}
        run: |
          set -euo pipefail
          bundle_root="${RUNNER_TEMP}/bundle"
          mkdir -p "${bundle_root}/envs/${{ inputs.environment }}"
          cp compose.yml "${bundle_root}/compose.yml"
          cp "envs/${{ inputs.environment }}/compose.yml" "${bundle_root}/envs/${{ inputs.environment }}/compose.yml"
          cp "envs/${{ inputs.environment }}/.env.db" "${bundle_root}/envs/${{ inputs.environment }}/.env.db"
          cat > "${bundle_root}/envs/${{ inputs.environment }}/.env.deploy" <<EOF
          MAKEPAD_POSTGRES_CATWLK_DB_NETWORK=${DEPLOY_CATWLK_DB_NETWORK:-makepad_keycloak_catwlk_db}
          MAKEPAD_POSTGRES_VIF_DB_NETWORK=${DEPLOY_VIF_DB_NETWORK:-makepad_keycloak_vif_db}
          MAKEPAD_POSTGRES_MAKEPAD_DB_NETWORK=${DEPLOY_MAKEPAD_DB_NETWORK:-makepad_keycloak_makepad_db}
          MAKEPAD_POSTGRES_VESTIAIRE_DB_NETWORK=${DEPLOY_VESTIAIRE_DB_NETWORK:-makepad_keycloak_vestiaire_db}
          EOF

      - name: Deploy via Docker Swarm
        shell: bash
        env:
          REMOTE_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REMOTE_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_USER: ${{ secrets.DEPLOY_SSH_USER }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
          STACK_NAME: ${{ secrets.DEPLOY_STACK_NAME }}
        run: |
          set -euo pipefail
          : "${REMOTE_HOST:?}" "${REMOTE_USER:?}" "${REMOTE_DIR:?}" "${STACK_NAME:?}"
          bundle_root="${RUNNER_TEMP}/bundle"
          remote_port=${REMOTE_PORT:-22}
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${remote_port}")
          scp_opts=(-o StrictHostKeyChecking=accept-new -P "${remote_port}")
          remote_target="${REMOTE_USER}@${REMOTE_HOST}"

          ssh "${ssh_opts[@]}" "${remote_target}" mkdir -p "${REMOTE_DIR}/envs/${{ inputs.environment }}"
          scp "${scp_opts[@]}" "${bundle_root}/compose.yml" "${remote_target}:${REMOTE_DIR}/compose.yml"
          scp "${scp_opts[@]}" "${bundle_root}/envs/${{ inputs.environment }}/compose.yml" "${remote_target}:${REMOTE_DIR}/envs/${{ inputs.environment }}/compose.yml"
          scp "${scp_opts[@]}" "${bundle_root}/envs/${{ inputs.environment }}/.env.db" "${remote_target}:${REMOTE_DIR}/envs/${{ inputs.environment }}/.env.db"
          scp "${scp_opts[@]}" "${bundle_root}/envs/${{ inputs.environment }}/.env.deploy" "${remote_target}:${REMOTE_DIR}/envs/${{ inputs.environment }}/.env.deploy"

          ssh "${ssh_opts[@]}" "${remote_target}" bash -se -- "${REMOTE_DIR}" "${STACK_NAME}" "${{ inputs.environment }}" <<'EOF'
          set -euo pipefail
          remote_dir=$1
          stack_name=$2
          deploy_env=$3
          env_deploy="${remote_dir}/envs/${deploy_env}/.env.deploy"

          ensure_network() {
            local db_network=$1
            if docker network inspect "${db_network}" >/dev/null 2>&1; then
              local driver attachable
              driver=$(docker network inspect "${db_network}" --format '{{.Driver}}')
              attachable=$(docker network inspect "${db_network}" --format '{{.Attachable}}')
              if [[ "${driver}" != "overlay" ]]; then
                echo "Network ${db_network} exists with driver ${driver}; expected overlay." >&2
                exit 1
              fi
              if [[ "${attachable}" != "true" ]]; then
                echo "Network ${db_network} exists with attachable=${attachable}; expected true." >&2
                exit 1
              fi
              return
            fi

            docker network create --driver overlay --attachable "${db_network}" >/dev/null
          }

          while IFS='=' read -r key value; do
            case "${key}" in
              MAKEPAD_POSTGRES_*_DB_NETWORK)
                ensure_network "${value}"
                ;;
            esac
          done < "${env_deploy}"

          set -a
          . "${env_deploy}"
          set +a

          docker compose \
            --env-file "${remote_dir}/envs/${deploy_env}/.env.db" \
            --env-file "${env_deploy}" \
            -f "${remote_dir}/compose.yml" \
            -f "${remote_dir}/envs/${deploy_env}/compose.yml" \
            config > "${remote_dir}/stack.yml"

          docker stack deploy --compose-file "${remote_dir}/stack.yml" "${stack_name}"
          EOF
