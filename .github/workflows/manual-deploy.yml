name: Manual Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

      - name: Upload deployment bundle
        shell: bash
        env:
          REMOTE_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REMOTE_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_USER: ${{ secrets.DEPLOY_SSH_USER }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          set -euo pipefail
          remote_port=${REMOTE_PORT:-22}
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${remote_port}")
          scp_opts=(-o StrictHostKeyChecking=accept-new -P "${remote_port}")
          remote_target="${REMOTE_USER}@${REMOTE_HOST}"

          ssh "${ssh_opts[@]}" "${remote_target}" mkdir -p "${REMOTE_DIR}/envs/production" "${REMOTE_DIR}/scripts" "${REMOTE_DIR}/systemd"
          scp "${scp_opts[@]}" compose.yml "${remote_target}:${REMOTE_DIR}/compose.yml"
          scp "${scp_opts[@]}" envs/production/.env.db "${remote_target}:${REMOTE_DIR}/envs/production/.env.db"
          scp "${scp_opts[@]}" scripts/provision-catwlk.sh "${remote_target}:${REMOTE_DIR}/scripts/provision-catwlk.sh"
          scp "${scp_opts[@]}" scripts/backup-postgres.sh "${remote_target}:${REMOTE_DIR}/scripts/backup-postgres.sh"
          scp "${scp_opts[@]}" systemd/makepad-postgres.service "${remote_target}:${REMOTE_DIR}/systemd/makepad-postgres.service"
          scp "${scp_opts[@]}" systemd/makepad-postgres-backup.service "${remote_target}:${REMOTE_DIR}/systemd/makepad-postgres-backup.service"
          scp "${scp_opts[@]}" systemd/makepad-postgres-backup.timer "${remote_target}:${REMOTE_DIR}/systemd/makepad-postgres-backup.timer"

      - name: Enable postgres service and backup timer
        shell: bash
        env:
          REMOTE_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REMOTE_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_USER: ${{ secrets.DEPLOY_SSH_USER }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          set -euo pipefail
          remote_port=${REMOTE_PORT:-22}
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${remote_port}")
          remote_target="${REMOTE_USER}@${REMOTE_HOST}"

          ssh "${ssh_opts[@]}" "${remote_target}" bash -se -- "${REMOTE_DIR}" <<'EOF'
          set -euo pipefail
          remote_dir=$1

          chmod 755 "${remote_dir}/scripts/provision-catwlk.sh" "${remote_dir}/scripts/backup-postgres.sh"
          sudo cp "${remote_dir}/systemd/makepad-postgres.service" /etc/systemd/system/makepad-postgres.service
          sudo cp "${remote_dir}/systemd/makepad-postgres-backup.service" /etc/systemd/system/makepad-postgres-backup.service
          sudo cp "${remote_dir}/systemd/makepad-postgres-backup.timer" /etc/systemd/system/makepad-postgres-backup.timer
          sudo systemctl daemon-reload
          sudo systemctl enable --now makepad-postgres.service
          sudo systemctl enable --now makepad-postgres-backup.timer
          EOF
