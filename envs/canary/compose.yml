services:
  postgres:
    env_file:
      - ./envs/canary/.env.db
    volumes:
      - "${MAKEPAD_POSTGRES_DATA_PATH:-/var/lib/makepad/postgres-canary}:/var/lib/postgresql/data"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra.makepad.postgres == true
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first

networks:
  catwlk_db:
    external: true
    name: ${MAKEPAD_POSTGRES_CATWLK_DB_NETWORK}
  vif_db:
    external: true
    name: ${MAKEPAD_POSTGRES_VIF_DB_NETWORK}
  makepad_db:
    external: true
    name: ${MAKEPAD_POSTGRES_MAKEPAD_DB_NETWORK}
  vestiaire_db:
    external: true
    name: ${MAKEPAD_POSTGRES_VESTIAIRE_DB_NETWORK}
